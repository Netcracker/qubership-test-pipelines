jobs:
  ## A special configuration section for generating jobs for installing previous releases on the current version
  - purpose: automation
    name: Clean [${release_version}], Upgrade to [${service_branch}]
    sequence: upgrade
    restricted: false
    check_core_tests: true
    check_services_tests: true
    tls: false
    install:
      version: ${release_version}
      core_template: templates/pgskipper/patroni-core-quickstart-sample.yaml
      services_template: templates/pgskipper/patroni-services-quickstart-sample.yaml
      artifact_name: Clean_${release_version}_Upgrade_${service_branch}
    upgrade:
      version: ${service_branch}
      core_template: templates/pgskipper/patroni-core-quickstart-sample.yaml
      services_template: templates/pgskipper/patroni-services-quickstart-sample.yaml
      artifact_name: Clean_${release_version}_Upgrade_${service_branch}
  ## ===========================================================================================================
  - name: Clean [${service_branch}] TLS
    sequence: install
    restricted: false
    tls: true
    install:
      version: ${service_branch}
      core_template: templates/pgskipper/patroni-core-tls.yaml
      services_template: templates/pgskipper/patroni-services-tls.yaml
      artifact_name: Clean_CURRENT_TLS

  - name: Clean [${service_branch}]. Upgrade [${service_branch}] Diff Params
    sequence: upgrade
    restricted: false
    check_core_tests: true
    check_services_tests: true
    tls: false
    install:
      version: ${service_branch}
      core_template: templates/pgskipper/patroni-core-quickstart-sample.yaml
      services_template: templates/pgskipper/patroni-services-quickstart-sample.yaml
      artifact_name: Clean_CURRENT_Upgrade_CURRENT_Diff_Params
    upgrade:
      version: ${service_branch}
      core_template: templates/pgskipper/patroni-core-diffparams.yaml
      services_template: templates/pgskipper/patroni-services-diffparams.yaml
      artifact_name: Clean_CURRENT_Upgrade_CURRENT_Diff_Params

  - name: Clean [${service_branch}] Full-AT
    sequence: install
    restricted: false
    check_core_tests: true
    check_services_tests: true
    tls: false
    install:
      version: ${service_branch}
      core_template: templates/pgskipper/patroni-core-fullat.yaml
      services_template: templates/pgskipper/patroni-services-fullat.yaml
      artifact_name: Clean_CURRENT_Full-AT

  - purpose: automation
    name: Clean [${release_version}] Restricted, Upgrade From [${release_version}] To [${service_branch}] Restricted
    sequence: upgrade
    restricted: true
    check_core_tests: true
    check_services_tests: true
    tls: false
    install:
      version: ${release_version}
      core_template: templates/pgskipper/patroni-core-quickstart-sample.yaml
      services_template: templates/pgskipper/patroni-services-quickstart-sample.yaml
      artifact_name: Clean_${release_version}_Restricted_Upgrade_From_${release_version}_To_${service_branch}_Restricted
    upgrade:
      version: ${service_branch}
      core_template: templates/pgskipper/patroni-core-diffparams.yaml
      services_template: templates/pgskipper/patroni-services-diffparams.yaml
      artifact_name: Clean_${release_version}_Restricted_Upgrade_From_${release_version}_To_${service_branch}_Restricted

  - name: Clean [${service_branch}] non-TLS, Upgrade [${service_branch}] with TLS
    sequence: upgrade
    restricted: false
    tls: true
    install:
      version: ${service_branch}
      core_template: templates/pgskipper/patroni-core-quickstart-sample.yaml
      services_template: templates/pgskipper/patroni-services-quickstart-sample.yaml
      artifact_name: Clean_CURRENT_Upgrade_CURRENT_TLS
    upgrade:
      version: ${service_branch}
      core_template: templates/pgskipper/patroni-core-tls.yaml
      services_template: templates/pgskipper/patroni-services-tls.yaml
      artifact_name: Clean_CURRENT_Upgrade_CURRENT_TLS

  - name: Clean [${service_branch}] Allure
    sequence: install
    restricted: false
    check_core_tests: true
    check_services_tests: true
    tls: false
    install:
      version: ${service_branch}
      core_template: templates/pgskipper/patroni-core-fullat-allure.yaml
      services_template: templates/pgskipper/patroni-services-fullat-allure.yaml
      artifact_name: Clean_CURRENT_Allure
      allure: true