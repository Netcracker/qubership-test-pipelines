global:
  name: kafka
  secrets:
    kafka:
      adminUsername: admin
      adminPassword: admin
      clientUsername: client
      clientPassword: client
    akhq:
      defaultUsername: admin
      defaultPassword: admin
    backupDaemon:
      username: admin
      password: admin
    cruiseControl:
      adminUsername: "admin"
      adminPassword: "admin"
      viewerUsername: "cert"
      viewerPassword: "cert"  

  disasterRecovery:
    httpAuth:
      enabled: false
      smSecureAuth: false
    mode: "active"
    region: "first"
    siteManagerEnabled: false
    mirrorMakerReplication:
      enabled: true

kafka:
  install: true
  ccMetricReporterEnabled: true
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: component
                operator: In
                values:
                  - kafka
          topologyKey: kubernetes.io/hostname
  replicas: 3
  storage:
    size: 1Gi
    className:
      - standard
  securityContext:
    runAsUser: 1000
    fsGroup: 1000

crdInit:
  lifetimeAfterCompletion: 320
  sleepAfterCompletion: 10

monitoring:
  install: true
  serviceMonitorEnabled: true

  lagExporter:
    enabled: true

akhq:
  install: true
  ingress:
    host: akhq-kafka-service.qubership.com

mirrorMaker:
  install: true
  regionName: "first"
  clusters:
    - {"name": "first", "bootstrapServers": "kafka:9092", "username": "client", "password": "client"}
  replicationPrefixEnabled: true

mirrorMakerMonitoring:
  install: true

integrationTests:
  install: true
  waitForResult: true
  tags: kafka_crud
backupDaemon:
  install: true
  storage: 1Gi
  storageClass: standard
  securityContext:
    runAsUser: 1000
    fsGroup: 1000
cruiseControl:
  install: true
PAAS_PLATFORM: KUBERNETES
