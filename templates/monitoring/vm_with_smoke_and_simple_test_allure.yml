grafana:
  ingress:
    host: grafana-monitoring.testdomain.local
    install: true
integrationTests:
  install: true
  tags: grafanaORsmoke
  timeoutBeforeStart: 60
  statusWriting:
    enabled: false
  atpReport:
    enabled: true
    atpStorage:
      provider: aws
      serverUrl: s3.amazonaws.com
      bucket: qstp-results
      region: us-east-1
      username: ""
      password: ""
kubernetesMonitors:
  kubeSchedulerServiceMonitor:
    install: true
  kubeControllerManagerServiceMonitor:
    install: true
victoriametrics:
  vmAuth:
    ingress:
      install: true
      host: vmauth-monitoring.testdomain.local
  vmAlert:
    ingress:
      install: true
      host: vmalert-monitoring.testdomain.local
  vmSingle:
    ingress:
      install: true
      host: vmsingle-monitoring.testdomain.local
    resources:
      requests:
        memory: 768Mi
        cpu: 100m
      limits:
        memory: 2Gi
        cpu: 1500m
  vmAlertManager:
    ingress:
      install: true
      host: vmagent-monitoring.testdomain.local
