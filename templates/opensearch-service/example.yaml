dashboards:
  enabled: false
  ingress:
    enabled: false
    hosts:
      - host: dashboards-opensearch-service.example.com
        paths:
          - path: /

opensearch:
  sysctl:
    enabled: true
  securityConfig:
    authc:
      basic:
        username: "admin"
        password: "admin"

  master:
    enabled: true
    replicas: 3
    persistence:
      enabled: false
      storageClass: "default"
    resources:
      limits:
        cpu: 1
        memory: 4Gi
      requests:
        cpu: 250m
        memory: 2Gi
    javaOpts: "-Xms1024m -Xmx1024m"
  client:
    ingress:
      enabled: false
      path: /
      hosts:
        - opensearch-opensearch-service.example.com

monitoring:
  enabled: false

dbaasAdapter:
  enabled: false

curator:
  enabled: false
  username: "admin"
  password: "admin"

integrationTests:
  enabled: true