name: Install Monitoring
description: |
  Install and verify monitoring stack (VictoriaMetrics).
  Wraps helm_deploy, get_crds, verify_installation and optional collect_diag_info steps.
  Use this action in service workflows instead of duplicating the monitoring installation pattern.

inputs:
  artifact_name:
    description: |
      Artifact name for collect_diagnostics step.
      Example: Install_Monitoring_${{ matrix.test.install.artifact_name }}
    required: true

  check_tests:
    description: |
      Enable test checks in monitoring verification.
    required: false
    default: false

  service_ready_max_retries:
    description: |
      Maximum retries for monitoring verification.
    required: false
    default: 80

  service_ready_retry_interval:
    description: |
      Retry interval for monitoring verification.
    required: false
    default: "10s"

  monitoring_branch:
    description: |
      Service branch for monitoring helm deploy.
    required: false
    default: "v0.88.0"

runs:
  using: composite
  steps:
    - name: Install Monitoring
      uses: ./qubership-test-pipelines/actions/shared/helm_deploy
      id: monitoring_install
      with:
        path_to_template: templates/monitoring/vm_without_tests.yml
        service_branch: ${{ inputs.monitoring_branch }}
        service_name: monitoring
        repository_name: Netcracker/qubership-monitoring-operator
        path_to_chart: charts/qubership-monitoring-operator
        namespace: monitoring
        restricted: false

    - name: Get Installed Monitoring CR name
      uses: ./qubership-test-pipelines/actions/shared/get_crds
      id: install_monitoring_get_crds
      with:
        crd_location: Netcracker/qubership-monitoring-operator/charts/qubership-monitoring-operator/crds

    - name: Verify Monitoring installation
      uses: ./qubership-test-pipelines/actions/shared/verify_installation
      with:
        namespace: monitoring
        service_ready_max_retries: ${{ inputs.service_ready_max_retries }}
        service_ready_retry_interval: ${{ inputs.service_ready_retry_interval }}
        monitoring_pipeline: true
        repository_name: Netcracker/qubership-monitoring-operator
        crd_list: ${{ steps.install_monitoring_get_crds.outputs.crd_names }}
        check_tests: ${{ inputs.check_tests }}

    - name: Collect Diagnostics Monitoring installation
      uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
      with:
        namespace: monitoring
        artifact_name: ${{ inputs.artifact_name }}
        service_branch: main
