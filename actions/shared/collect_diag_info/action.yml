name: Collect Diagnostics Action
description: A GitHub Action to collect logs and artifacts from Kubernetes namespace.
inputs:
  namespace:
    description: |
      Kubernetes namespace for service installation
    required: true

  service_branch:
    description: |
      Branch in service repository
    required: false

  artifact_name:
    description: |
      Name of the artifact to be uploaded
    required: false
    default: ""

  monitoring_pipeline:
    description: |
      Only for Monitoring. Enable monitoring CRs checks (true) or disable them (false)
    required: false
    type: boolean
    default: false

runs:
  using: composite
  steps:
    - name: Create folder for artifacts
      shell: bash
      # language=bash
      run: mkdir -p artifacts

    - name: Get monitoring specific resources
      if: ${{ inputs.monitoring_pipeline == 'true' }}
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
      # language=bash
      run: |
        # ▶️ Get monitoring specific resources
        set +e
        echo "Getting VictoriaMetrics specific resources..."
        kubectl get vmalertmanagers -n "$NAMESPACE" -o yaml > artifacts/vmalertmanagers.yaml 2>/dev/null || true
        kubectl get vmalerts -n "$NAMESPACE" -o yaml > artifacts/vmalerts.yaml 2>/dev/null || true
        kubectl get vmagent -n "$NAMESPACE" -o yaml > artifacts/vmagent.yaml 2>/dev/null || true
        kubectl get vmsingles -n "$NAMESPACE" -o yaml > artifacts/vmsingles.yaml 2>/dev/null || true
        kubectl get vmauths -n "$NAMESPACE" -o yaml > artifacts/vmauths.yaml 2>/dev/null || true
        kubectl get PlatformMonitoring platformmonitoring -n "$NAMESPACE" -o yaml > artifacts/PlatformMonitoring.yaml 2>/dev/null || true

    - name: Get pods
      shell: bash
      if: always()
      env:
        NAMESPACE: ${{ inputs.namespace }}
      # language=bash
      run: |
        # ▶️ Get pods
        set +e
        file_name="artifacts/${NAMESPACE}_get_pods.txt"
        kubectl get pods -n "$NAMESPACE"
        kubectl get pods -n "$NAMESPACE" > "$file_name" 2>/dev/null || true

    - name: Get yaml from pods
      shell: bash
      if: always()
      env:
        NAMESPACE: ${{ inputs.namespace }}
      # language=bash
      run: |
        # ▶️ Get yaml from pods
        set +e
        mkdir -p artifacts/pod_yamls
        IFS=" " read -ra pods <<< "$(kubectl get pods --no-headers -o custom-columns=":metadata.name" -n "$NAMESPACE" 2>/dev/null | tr "\n" " ")"
        for pod in "${pods[@]}"; do
            kubectl get pod "$pod" -n "$NAMESPACE" -o yaml > "artifacts/pod_yamls/${pod}.yaml" 2>/dev/null || echo "⚠️ Failed to get yaml for $pod" > "artifacts/pod_yamls/${pod}_FAILED.txt"
        done

    - name: Get events from namespace
      shell: bash
      if: always()
      env:
        NAMESPACE: ${{ inputs.namespace }}
      # language=bash
      run: |
        # ▶️ Get events from namespace
        set +e
        file_name="artifacts/${NAMESPACE}_get_events.txt"
        kubectl events -n "$NAMESPACE" > "$file_name" 2>/dev/null || true

    - name: Get yaml from PVC
      shell: bash
      if: always()
      env:
        NAMESPACE: ${{ inputs.namespace }}
      # language=bash
      run: |
        # ▶️ Get yaml from PVC
        set +e
        file_name="artifacts/${NAMESPACE}_get_pvc_yaml.yaml"
        kubectl get pvc -n "$NAMESPACE" 2>/dev/null || true
        kubectl get pvc -n "$NAMESPACE" -o yaml > "$file_name" 2>/dev/null || true

    - name: Get PV from namespace
      shell: bash
      if: always()
      env:
        NAMESPACE: ${{ inputs.namespace }}
      # language=bash
      run: |
        # ▶️ Get PV from namespace
        set +e
        file_name="artifacts/${NAMESPACE}_get_pv.txt"
        if kubectl get pv 2>/dev/null | grep -q "$NAMESPACE"; then
          kubectl get pv | grep "$NAMESPACE" > "$file_name"
          echo "✅ PV found and saved to $file_name"
        else
          echo "No PV found for namespace $NAMESPACE" > "$file_name"
          echo "ℹ️ No PV found for namespace $NAMESPACE"
        fi

    - name: Get logs from all containers in pods
      shell: bash
      if: always()
      env:
        NAMESPACE: ${{ inputs.namespace }}
      # language=bash
      run: |
        # ▶️ Get logs from all containers in pods
        set +e
        mkdir -p artifacts/logs
        IFS=' ' read -ra pods <<< $(kubectl get pods --no-headers -o custom-columns=":metadata.name" -n "$NAMESPACE" 2>/dev/null | tr $'\n' ' ')

        # Array for pending containers "pod:container"
        declare -a pending=()

        # First pass: collect logs from ready containers, add unready ones to pending
        for pod in "${pods[@]}"; do
            IFS=' ' read -ra containers <<< $(kubectl get pod "$pod" -n "$NAMESPACE" -o jsonpath="{.spec.containers[*].name}" 2>/dev/null || echo "")
            for container in "${containers[@]}"; do
                echo "Trying to get logs from ${container}"
                status=$(kubectl get pod "$pod" -n "$NAMESPACE" -o jsonpath="{.status.containerStatuses[?(@.name==\"$container\")].state}" 2>/dev/null || echo "unknown")
                if [[ $status == *"running"* || $status == *"terminated"* ]]; then
                    log_file="artifacts/logs/${pod}__${container}.log"
                    kubectl logs "$pod" -n "$NAMESPACE" -c "$container" > "$log_file" 2>&1 || echo "❌ Failed to collect log (pod might be gone)" >> "$log_file"
                    echo "✅ Container (${container}) logs successfully saved to $log_file"
                    restart_count=$(kubectl get pod "$pod" -n "$NAMESPACE" -o jsonpath="{.status.containerStatuses[?(@.name==\"$container\")].restartCount}" 2>/dev/null || echo "0")
                    restart_count="${restart_count:-0}"
                    if [[ "$restart_count" =~ ^[0-9]+$ && "$restart_count" -gt 0 ]]; then
                        previous_log_file="artifacts/logs/${pod}__${container}__previous.log"
                        if kubectl logs "$pod" -n "$NAMESPACE" -c "$container" --previous > "$previous_log_file" 2>&1; then
                            echo "✅ Container (${container}) previous logs successfully saved to $previous_log_file"
                        else
                            echo "❌ Failed to collect previous log (pod might be gone)" >> "$previous_log_file"
                        fi
                    fi
                else
                    echo "ℹ️ Container (${container}) is not ready yet. Send it to pending."
                    pending+=("$pod:$container")
                fi
            done
        done

        # ▶️ Waiting for pending with a general timeout
        echo "▶️ Waiting for pending with a general timeout"
        timeout=300
        start_time=$(date +%s)
        while [ ${#pending[@]} -gt 0 ]; do
            current_time=$(date +%s)
            if (( current_time - start_time > timeout )); then
                for item in "${pending[@]}"; do
                    IFS=':' read -r pod container <<< "$item"
                    echo "$pod $container - skipped (timed out waiting for readiness)"
                done
                break
            fi

            # Copy pending to modify the original
            declare -a current_pending=("${pending[@]}")
            pending=()
            for item in "${current_pending[@]}"; do
                IFS=':' read -r pod container <<< "$item"
                status=$(kubectl get pod "$pod" -n "$NAMESPACE" -o jsonpath="{.status.containerStatuses[?(@.name==\"$container\")].state}" 2>/dev/null || echo "unknown")
                if [[ $status == *"running"* || $status == *"terminated"* ]]; then
                    log_file="artifacts/logs/${pod}_${container}.log"
                    kubectl logs "$pod" -n "$NAMESPACE" -c "$container" > "$log_file" 2>&1 || echo "❌ Failed to collect log (pod might be gone)" >> "$log_file"
                    echo "✅ Container (${container}) logs successfully saved to $log_file"
                    restart_count=$(kubectl get pod "$pod" -n "$NAMESPACE" -o jsonpath="{.status.containerStatuses[?(@.name==\"$container\")].restartCount}" 2>/dev/null || echo "0")
                    restart_count="${restart_count:-0}"
                    if [[ "$restart_count" =~ ^[0-9]+$ && "$restart_count" -gt 0 ]]; then
                        previous_log_file="artifacts/logs/${pod}_${container}__previous.log"
                        if kubectl logs "$pod" -n "$NAMESPACE" -c "$container" --previous > "$previous_log_file" 2>&1; then
                            echo "✅ Container (${container}) previous logs successfully saved to $previous_log_file"
                        else
                            echo "❌ Failed to collect previous log (pod might be gone)" >> "$previous_log_file"
                        fi
                    fi
                else
                    pending+=("$pod:$container")
                    echo "ℹ️ Container (${container}) is not ready yet. Send it to pending."
                fi
            done

            # If there are any pending ones left, wait before the next iteration
            if [ ${#pending[@]} -gt 0 ]; then
                sleep 5  # Wait 5 seconds before next check
            fi
        done

    - name: Get All
      shell: bash
      if: always()
      env:
        NAMESPACE: ${{ inputs.namespace }}
      # language=bash
      run: |
        # ▶️ Get All
        set +e
        kubectl get all -n "$NAMESPACE" 2>/dev/null || true

    - name: Get Secrets
      shell: bash
      if: always()
      env:
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        # ▶️ Get Secrets
        set +e
        kubectl get secrets -n "$NAMESPACE" 2>/dev/null || true

    - name: Generate artifact name
      if: always()
      id: generate_artifact_name
      shell: bash
      env:
        SERVICE_BRANCH: ${{ inputs.service_branch }}
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
        MATRIX_VERSION: ${{ matrix.version }}
        GITHUB_JOB: ${{ github.job }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        # ▶️ Generate artifact name
        set +e
        service_branch=$(echo "$SERVICE_BRANCH" | tr -d '[:space:]')
        service_branch="${service_branch//\//_}"
        matrix_suffix=""
        if [[ -n "$MATRIX_VERSION" ]]; then
          matrix_suffix="${MATRIX_VERSION}_"
        fi

        if [[ "$INPUT_ARTIFACT_NAME" != "" ]]; then
          artifact_name="$INPUT_ARTIFACT_NAME"
          ARTIFACT_NAME="${artifact_name//\//_}_$(date -u +'%Y%m%d%H%M%S%3N')"
        else
          ARTIFACT_NAME="${GITHUB_JOB}_${NAMESPACE}_${service_branch}_${matrix_suffix}artifacts_$(date -u +"%Y%m%d%H%M%S%3N")"
        fi
        echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

    - name: Upload artifact
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ steps.generate_artifact_name.outputs.ARTIFACT_NAME }}
        path: artifacts/
