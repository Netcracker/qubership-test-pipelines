name: Verify Installation Action
description: A GitHub Action to verify Kubernetes deployments including status checks and test validation.
inputs:
  namespace:
    description: |
      Kubernetes namespace for service installation
    required: true

  service_ready_max_retries:
    description: |
      Maximum retries for provisioner pod or custom resource to be completed
    required: true

  service_ready_retry_interval:
    description: |
      Delay between provisioner pod / CR check attempts (in seconds)
    required: true

  test_completion_max_retries:
    description: |
      Maximum verification retries for test pod to be completed
    required: false
    default: "1"

  test_completion_retry_interval:
    description: |
      Delay between test pod check attempts
    required: false
    default: "10s"

  crd_list:
    description: |
      List of custom resource definitions for checking deploy status.
    required: false

  check_tests:
    description: |
      Enable test checks (true) or disable them (false)
    required: false
    type: boolean
    default: true

  monitoring_pipeline:
    description: |
      Only for Monitoring. Enable monitoring CRs checks (true) or disable them (false)
    required: false
    type: boolean
    default: false

  repository_name:
    description: |
      Name of the repository where the action is being executed. Used for monitoring specific checks.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Create folder for artifacts
      shell: bash
      # language=bash
      run: |
        mkdir -p artifacts
        rm -rf -- artifacts/* artifacts/.[!.]* artifacts/..?* 2>/dev/null || true

    - name: Initialize error flag
      shell: bash
      # language=bash
      run: echo "ERROR_FLAG=false" >> $GITHUB_ENV

    - name: Check service is ready
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        SERVICE_READY_MAX_RETRIES: ${{ inputs.service_ready_max_retries }}
        SERVICE_READY_RETRY_INTERVAL: ${{ inputs.service_ready_retry_interval }}
        CRD_LIST: ${{ inputs.crd_list }}
        MONITORING_PIPELINE: ${{ inputs.monitoring_pipeline }}
        REPOSITORY_NAME: ${{ inputs.repository_name }}
      # language=bash
      run: |
        # ▶️ Check service is ready
        chmod +x ./qubership-test-pipelines/scripts/check_cr.sh
        chmod +x ./qubership-test-pipelines/scripts/check_resources.sh

        echo "Checking CRDs: $CRD_LIST"
        cr_success=false
        resources_success=false

        for i in $(seq 1 "$SERVICE_READY_MAX_RETRIES"); do
          echo "Attempt $i/$SERVICE_READY_MAX_RETRIES"

          if [ "$cr_success" = "false" ]; then
            set +e
            ./qubership-test-pipelines/scripts/check_cr.sh "$CRD_LIST" "$NAMESPACE"
            cr_exit_code=$?
            set -e

            case $cr_exit_code in
              0)
                echo "✅ CR check successful"
                cr_success=true
                ;;
              1)
                echo "⏳ CR check in progress"
                echo -e "Retrying in $SERVICE_READY_RETRY_INTERVAL seconds...\n"
                sleep "$SERVICE_READY_RETRY_INTERVAL"
                ;;
              2)
                echo "::error:: ❌ CR check failed"
                echo "ERROR_FLAG=true" >> $GITHUB_ENV
                cr_success=false
                break
                ;;
            esac
          fi

          if [ "$resources_success" = "false" ]; then
            set +e
            ./qubership-test-pipelines/scripts/check_resources.sh "$NAMESPACE"
            resources_exit_code=$?
            set -e

            if [ $resources_exit_code -eq 0 ]; then
              echo "✅ Resources checks successful"
              resources_success=true
            elif [ $resources_exit_code -eq 1 ]; then
              echo "⏳ Some resources are not ready"
              #echo "PODS:"
              #kubectl get pods -n "$NAMESPACE"
              #sleep "$SERVICE_READY_RETRY_INTERVAL"
            fi
          fi

          if [ "$cr_success" = "true" ] && [ "$resources_success" = "true" ]; then
            echo "✅ All checks completed successfully!"
            break
          fi

          if [ $i -lt $SERVICE_READY_MAX_RETRIES ]; then
            sleep $SERVICE_READY_RETRY_INTERVAL
          fi
        done

        if [ "$cr_success" = "false" ]; then
          echo "::error:: ❌ CR check not successful after $SERVICE_READY_MAX_RETRIES retries"
          echo "ERROR_FLAG=true" >> $GITHUB_ENV
        fi
        if [ "$resources_success" = "false" ]; then
          echo "::error:: ❌ Resources not ready after $SERVICE_READY_MAX_RETRIES retries"
          echo "ERROR_FLAG=true" >> $GITHUB_ENV
        fi

    - name: Get monitoring specific resources
      if: ${{ inputs.monitoring_pipeline == 'true' }}
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        SERVICE_READY_MAX_RETRIES: ${{ inputs.service_ready_max_retries }}
        SERVICE_READY_RETRY_INTERVAL: ${{ inputs.service_ready_retry_interval }}
        CRD_LIST: ${{ inputs.crd_list }}
        MONITORING_PIPELINE: ${{ inputs.monitoring_pipeline }}
        REPOSITORY_NAME: ${{ inputs.repository_name }}
      # language=bash
      run: |
        # ▶️ Get monitoring specific resources
        if [[ "$MONITORING_PIPELINE" == "true" ]]; then
          echo "Checking VictoriaMetrics CRs in namespace: $NAMESPACE"
          chmod +x ./qubership-test-pipelines/scripts/monitoring/check-vm-cr-statuses.sh
          echo "Current directory: $(pwd)"
          echo "$REPOSITORY_NAME/.github/expected-vm-cr-statuses.json"
          cat "$REPOSITORY_NAME/.github/expected-vm-cr-statuses.json"
          ./qubership-test-pipelines/scripts/monitoring/check-vm-cr-statuses.sh \
            "$NAMESPACE" \
            "$SERVICE_READY_MAX_RETRIES" \
            "SERVICE_READY_RETRY_INTERVAL" \
            "$REPOSITORY_NAME/.github/expected-vm-cr-statuses.json" \
            "$CRD_LIST"
        fi

    - name: Check test results
      if: inputs.check_tests == 'true'
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        TEST_COMPLETION_MAX_RETRIES: ${{ inputs.test_completion_max_retries }}
        TEST_COMPLETION_RETRY_INTERVAL: ${{ inputs.test_completion_retry_interval }}
      # language=bash
      run: |
        # ▶️ Get logs from test pod
        chmod +x ./qubership-test-pipelines/scripts/check_tests.sh
        ls -la ./qubership-test-pipelines/scripts/check_tests.sh

        for i in $(seq 1 "$TEST_COMPLETION_MAX_RETRIES"); do
          echo "Test check attempt $i/$TEST_COMPLETION_MAX_RETRIES"
          set +e
          ./qubership-test-pipelines/scripts/check_tests.sh "$NAMESPACE"
          tests_exit_code=$?
          set -e

          case $tests_exit_code in
            0)
              echo "✅ Tests passed successfully"
              break
              ;;
            1)
              echo "⏳ Tests still in progress"
              ;;
            2)
              echo "::error:: ❌ Tests failed"
              echo "ERROR_FLAG=true" >> $GITHUB_ENV
              break
              ;;
          esac

          if [ "$i" -eq "$TEST_COMPLETION_MAX_RETRIES" ]; then
            echo "::warning:: ⚠️ Tests not completed after $TEST_COMPLETION_MAX_RETRIES retries"
            echo "ERROR_FLAG=true" >> $GITHUB_ENV
          else
            sleep "$TEST_COMPLETION_RETRY_INTERVAL"
          fi
        done

    - name: Check job status
      shell: bash
      # language=bash
      run: |
        # ▶️ Check deploy status
        if [[ "$ERROR_FLAG" == "true" ]]; then
          echo "::error:: ❌ Service was installed with errors!"
          exit 1
        else
          echo "✅ Service installation completed successfully"
        fi
