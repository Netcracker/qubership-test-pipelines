name: Cleanup S3 Bucket
description: Deletes an S3 bucket if it exists
inputs:
  aws_access_key_id:
    required: true
  aws_secret_access_key:
    required: true
  bucket_name:
    required: true
  region:
    required: false
    default: us-east-1
runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
      with:
        aws-access-key-id: ${{ inputs.aws_access_key_id }}
        aws-secret-access-key: ${{ inputs.aws_secret_access_key }}
        aws-region: ${{ inputs.region }}
    - name: Delete bucket
      shell: bash
      env:
        BUCKET: ${{ inputs.bucket_name }}
        REGION: ${{ inputs.region }}
      run: |
        if aws s3 ls "s3://${BUCKET}" --region "${REGION}" >/dev/null 2>&1; then
          aws s3 rb "s3://${BUCKET}" --region "${REGION}" --force
          echo "Bucket ${BUCKET} deleted"
        else
          echo "::warning:: Bucket ${BUCKET} does not exist, skipping deletion."
        fi
