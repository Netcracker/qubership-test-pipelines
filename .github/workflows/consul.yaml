name: Reusable Consul Tests

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      repository_name:
        description: Repository with Consul service
        required: false
        type: string
        default: Netcracker/qubership-consul
      service_branch:
        description: Branch of qubership-consul repository
        required: false
        type: string
        default: main
      pipeline_branch:
        description: Branch of qubership-test-pipelines repository
        type: string
        required: true
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      scope:
        description: Consul Test Scope (pr, nightly or hardening)
        type: string
        required: false
        default: pr
      skip_tests:
        description: Skip all tests (for doc-only changes)
        type: boolean
        required: false
        default: false
      verify_timeout_minutes:
        description: Maximum time (in minutes) to wait for each service verification
        type: number
        required: false
        default: 15
  workflow_call:
    inputs:
      repository_name:
        description: Repository with Consul service
        required: false
        type: string
        default: Netcracker/qubership-consul
      service_branch:
        description: Branch of qubership-consul repository
        required: false
        type: string
        default: main
      pipeline_branch:
        description: Branch of qubership-test-pipelines repository
        type: string
        required: true
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      scope:
        description: Consul Test Scope (pr, nightly or hardening)
        type: string
        required: false
        default: pr
      skip_tests:
        description: Skip all tests (for doc-only changes)
        type: boolean
        required: false
        default: false
      verify_timeout_minutes:
        description: Maximum time (in minutes) to wait for each service verification
        type: number
        required: false
        default: 15

    secrets:
      AWS_S3_ACCESS_KEY_ID:
        required: true
      AWS_S3_ACCESS_KEY_SECRET:
        required: true

jobs:
  prepare:
    if: ${{ !inputs.skip_tests }}
    runs-on: ${{ inputs.runner_type }}
    outputs:
      versions: ${{ steps.process-versions.outputs.versions }}
      matrix: ${{ steps.process-versions.outputs.matrix }}
      service_ready_max_retries: ${{ steps.calc-timeout.outputs.service_ready_max_retries }}
      service_ready_retry_interval: ${{ steps.calc-timeout.outputs.service_ready_retry_interval }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.service_branch }}
          repository: ${{ inputs.repository_name }}
          path: qubership-consul
          persist-credentials: false

      - name: Checkout pipeline
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: Netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false

      - name: Get latest tag
        id: get-latest-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ inputs.repository_name }}
        run: |
          LATEST_TAG=$(gh api repos/${REPO_NAME}/releases/latest --jq '.tag_name')
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Calculate verify timeout parameters
        id: calc-timeout
        run: |
          RETRY_INTERVAL=10
          MAX_RETRIES=$(( ${{ inputs.verify_timeout_minutes }} * 60 / RETRY_INTERVAL ))
          echo "service_ready_max_retries=$MAX_RETRIES" >> $GITHUB_OUTPUT
          echo "service_ready_retry_interval=${RETRY_INTERVAL}s" >> $GITHUB_OUTPUT

      - name: Process versions file and matrix generation
        id: process-versions
        env:
          SCOPE: ${{ inputs.scope }}
          LATEST_TAG: ${{ steps.get-latest-tag.outputs.latest_tag }}
          SERVICE_BRANCH: ${{ inputs.service_branch }}
        working-directory: ${{ github.workspace }}/qubership-test-pipelines
        run: |
          chmod +x ./scripts/matrix.sh
          if [[ "$SCOPE" == "nightly" ]]; then
            CONFIG_FILE="./workflow-config/consul_nightly.yaml"
          elif [[ "$SCOPE" == "pr" ]]; then
            CONFIG_FILE="./workflow-config/consul.yaml"
          elif [[ "$SCOPE" == "hardening" ]]; then
            CONFIG_FILE="./workflow-config/consul_hardening.yaml"
          else
            echo "::error::Invalid scope parameter '$SCOPE'. Must be 'pr', 'nightly' or 'hardening'."
            exit 1
          fi
          ./scripts/matrix.sh "$LATEST_TAG" "$CONFIG_FILE" "$SERVICE_BRANCH"

  Consul-Test-Cases:
    if: ${{ !inputs.skip_tests }}
    needs: prepare
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.prepare.outputs.matrix) }}
    name: ${{ matrix.test.name }}
    env:
      MATRIX_JSON: ${{ toJson(matrix.test) }}
      NAMESPACE: consul
      TEST_COMPLETION_MAX_RETRIES: 1
      TEST_COMPLETION_RETRY_INTERVAL: 10s
      SERVICE_READY_MAX_RETRIES: ${{ needs.prepare.outputs.service_ready_max_retries }}
      SERVICE_READY_RETRY_INTERVAL: ${{ needs.prepare.outputs.service_ready_retry_interval }}
    steps:
      # == 01 Start ======= Common pre-steps for all tests =======
      - name: Print job parameters
        env:
          MATRIX_JSON: ${{ toJson(matrix.test) }}
        run: |
          echo "======== Job parameters ======="
          echo "$MATRIX_JSON"

      - name: Checkout pipeline
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: Netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false

      - name: Create cluster
        uses: ./qubership-test-pipelines/actions/shared/create_cluster
      # == 01 End ======= Common pre-steps for all tests =======

      # == Start Monitoring installation =======
      - name: Install Monitoring
        if: matrix.test.monitoring == true
        uses: ./qubership-test-pipelines/actions/shared/install_monitoring
        with:
          artifact_name: ${{ matrix.test.install.artifact_name }}_monitoring
      # == End Monitoring installation =======

      # == Start ======= Specific steps for TLS =======
      - name: Setup TLS
        if: matrix.test.install.tls == true
        uses: ./qubership-test-pipelines/actions/shared/setup_tls
        # == End ======= Specific steps for TLS =======

      # == Start ======= Specific steps for S3 =======
      - name: Create S3 bucket
        id: create_bucket
        if: matrix.test.install.s3 == true || matrix.test.upgrade.s3 == true
        uses: ./qubership-test-pipelines/actions/shared/setup_s3_bucket
        with:
          aws_access_key_id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}
          region: us-east-1
          prefix: consul

      - name: Add s3 secrets to template (clean install)
        if: matrix.test.install.s3 == true
        # zizmor: ignore[template-injection]
        run: |
          # ▶️ Add s3 secrets to template
          python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.install.template }}' \
            --path='backupDaemon/s3/keyId' \
            --value='${{ secrets.AWS_S3_ACCESS_KEY_ID }}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.install.template }}' \
            --path='backupDaemon/s3/keySecret' \
            --value='${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.install.template }}' \
            --path='backupDaemon/s3/bucket' \
            --value="${{ steps.create_bucket.outputs.bucket_name }}"
      # == End ======= Specific steps for S3 =======

      - name: Add s3 bucket for Allure report
        if: matrix.test.install.allure == true
        run: |
          python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.install.template }}' \
            --path='integrationTests/atpReport/atpStorage/username' \
            --value='${{secrets.AWS_S3_ACCESS_KEY_ID}}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.install.template }}' \
            --path='integrationTests/atpReport/atpStorage/password' \
            --value='${{secrets.AWS_S3_ACCESS_KEY_SECRET}}'

      - name: Print clean install deployment parameters
        run: cat qubership-test-pipelines/${{ matrix.test.install.template }}

      - name: Install Consul [${{ matrix.test.install.version }}]
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: consul_install
        with:
          path_to_template: ${{ matrix.test.install.template }}
          service_branch: ${{ matrix.test.install.version }}
          service_name: consul
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: charts/helm/consul-service
          namespace: consul
          restricted: ${{ matrix.test.restricted }}

      - name: Verify Consul installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.NAMESPACE }}
          service_ready_max_retries: ${{ env.SERVICE_READY_MAX_RETRIES }}
          service_ready_retry_interval: ${{ env.SERVICE_READY_RETRY_INTERVAL }}

      - name: Collect Diagnostics Consul installation
        if: ${{ !cancelled() && steps.consul_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: consul
          artifact_name: ${{ matrix.test.install.artifact_name }}
          service_branch: ${{ matrix.test.install.version }}

      - name: Delete status-provisioner job
        shell: bash
        run: kubectl delete job consul-status-provisioner -n consul
      # == 02 End ======= Common steps for all tests =======

      # == Start ======= Specific steps for S3 =======
      - name: Add s3 secrets to template (upgrade)
        if: matrix.test.sequence == 'upgrade' && matrix.test.upgrade.s3 == true
        shell: bash
        # zizmor: ignore[template-injection]
        run: |
          python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.upgrade.template }}' \
            --path='backupDaemon/s3/keyId' \
            --value='${{secrets.AWS_S3_ACCESS_KEY_ID}}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.upgrade.template }}' \
            --path='backupDaemon/s3/keySecret' \
            --value='${{secrets.AWS_S3_ACCESS_KEY_SECRET}}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.upgrade.template }}' \
            --path='backupDaemon/s3/bucket' \
            --value="${{ steps.create_bucket.outputs.bucket_name }}"

      - name: Print upgrade deployment parameters
        if: matrix.test.sequence == 'upgrade' && matrix.test.upgrade.s3 == true
        run: cat qubership-test-pipelines/${{ matrix.test.upgrade.template }}
      # == End ======= Specific steps for S3 =======

      # == Start ======= Specific steps for upgrade tests =======
      - name: Upgrade to [${{ matrix.test.upgrade.version }}]
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: consul_upgrade
        with:
          path_to_template: ${{ matrix.test.upgrade.template }}
          service_branch: ${{ matrix.test.upgrade.version }}
          deploy_mode: upgrade
          service_name: consul
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: charts/helm/consul-service
          namespace: consul
          restricted: ${{ matrix.test.restricted }}

      - name: Sleep 90s after update
        if: matrix.test.sequence == 'upgrade'
        run: sleep 90s

      - name: Hardening Check
        if: inputs.scope == 'hardening'
        uses: netcracker/qubership-workflow-hub/actions/k8s-hardening-scan@cabbb90e9471163cfac84bd50ff0296b2803b44c # v2.3.0
        with:
          namespaces: consul
          output-file: consul-hardening-scan.json
          install-kubescape: true
          execute-trivy-scan: false
          fail-on-mandatory-checks: true
          config-file: ${{ inputs.repository_name }}/.github/hardening-config.yaml

      - name: Verify Consul upgrade
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          check_tests: ${{ env.CHECK_TESTS }}
          namespace: ${{ env.NAMESPACE }}
          service_ready_max_retries: ${{ env.SERVICE_READY_MAX_RETRIES }}
          service_ready_retry_interval: ${{ env.SERVICE_READY_RETRY_INTERVAL }}

      - name: Collect Diagnostics Consul upgrade
        if: ${{ !cancelled() && steps.consul_upgrade.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: consul
          artifact_name: ${{ matrix.test.upgrade.artifact_name }}
          service_branch: ${{ matrix.test.upgrade.version }}
      # == End ======= Specific steps for upgrade tests =======

      # == Start ======= Specific steps for S3 =======
      - name: Delete S3 bucket
        if: always() && (matrix.test.install.s3 == true || matrix.test.upgrade.s3 == true)
        uses: ./qubership-test-pipelines/actions/shared/cleanup_s3_bucket
        with:
          aws_access_key_id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}
          bucket_name: ${{ steps.create_bucket.outputs.bucket_name }}
          region: us-east-1

      # == End ======= Specific steps for S3 =======

  final-status-check:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [Consul-Test-Cases]
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: Netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false

      - name: Check job status
        uses: ./qubership-test-pipelines/actions/shared/check_job_status
        with:
          job_result: ${{ needs.Consul-Test-Cases.result }}
