name: Reusable Opensearch Tests

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      repository_name:
        description: Repository with Opensearch service
        required: false
        type: string
        default: Netcracker/qubership-opensearch
      service_branch:
        required: false
        type: string
        default: main
      pipeline_branch:
        description: Test pipeline branch name
        type: string
        required: true
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      scope:
        description: Opensearch Test Scope (pr, nightly or hardening)
        type: string
        required: false
        default: pr
      skip_tests:
        description: Skip all tests (for doc-only changes)
        type: boolean
        required: false
        default: false

  workflow_call:
    inputs:
      repository_name:
        description: Repository with Opensearch service
        required: false
        type: string
        default: Netcracker/qubership-opensearch
      service_branch:
        required: false
        type: string
      pipeline_branch:
        description: Test pipeline branch name
        type: string
        required: true
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      scope:
        description: Opensearch Test Scope (pr, nightly or hardening)
        type: string
        required: false
        default: pr
      skip_tests:
        description: Skip all tests (for doc-only changes)
        type: boolean
        required: false
        default: false
    secrets:
      AWS_S3_ACCESS_KEY_ID:
        required: true
      AWS_S3_ACCESS_KEY_SECRET:
        required: true

jobs:
  prepare:
    if: ${{ !inputs.skip_tests }}
    runs-on: ${{ inputs.runner_type }}
    outputs:
      versions: ${{ steps.process-versions.outputs.versions }}
      matrix: ${{ steps.process-versions.outputs.matrix }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.service_branch }}
          repository: ${{ inputs.repository_name }}
          path: qubership-opensearch
          persist-credentials: false

      - name: Checkout pipeline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false

      - name: Get latest tag
        id: get-latest-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ inputs.repository_name }}
        run: |
          LATEST_TAG=$(gh api repos/${REPO_NAME}/releases/latest --jq '.tag_name')
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Process latest tag and matrix generation
        env:
          SCOPE: ${{ inputs.scope }}
          LATEST_TAG: ${{ steps.get-latest-tag.outputs.latest_tag }}
          SERVICE_BRANCH: ${{ inputs.service_branch }}
        id: process-versions
        working-directory: ${{ github.workspace }}/qubership-test-pipelines
        run: |
          chmod +x ./scripts/matrix.sh
          if [[ "$SCOPE" == "nightly" ]]; then
            CONFIG_FILE="./workflow-config/opensearch_nightly.yaml"
          elif [[ "$SCOPE" == "pr" ]]; then
            CONFIG_FILE="./workflow-config/opensearch.yaml"
          elif [[ "$SCOPE" == "hardening" ]]; then
            CONFIG_FILE="./workflow-config/opensearch_hardening.yaml"
          else
            echo "::error::Invalid scope parameter '$SCOPE'. Must be 'pr', 'nightly' or 'hardening'."
            exit 1
          fi
          ./scripts/matrix.sh "$LATEST_TAG" "$CONFIG_FILE" "$SERVICE_BRANCH"

  Opensearch-Test-Cases:
    if: ${{ !inputs.skip_tests }}
    needs: prepare
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.prepare.outputs.matrix) }}
    name: ${{ matrix.test.name }}
    env:
      namespace: opensearch
      test_completion_max_retries: 1
      test_completion_retry_interval: 10s
      service_ready_max_retries: 140
      service_ready_retry_interval: 10s
      service_branch: ""
      path_to_chart: operator/charts/helm/opensearch-service
    steps:
      # == 01 Start ======= Common pre-steps for all tests =======
      - name: Print job parameters
        env:
          MATRIX_JSON: ${{ toJson(matrix.test) }}
        run: |
          echo "======== Job parameters ======="
          echo "$MATRIX_JSON"

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout pipeline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false

      - name: Create cluster
        uses: ./qubership-test-pipelines/actions/shared/create_cluster
      # == 01 End ======= Common pre-steps for all tests =======

      # == Start ======= Specific steps for TLS =======
      - name: Install cert-manager
        if: ${{ matrix.test.tls == true }}
        run: |
          echo "::group::Install cert-manager"
          helm repo add jetstack https://charts.jetstack.io --force-update
          helm upgrade --install cert-manager jetstack/cert-manager --namespace cert-manager \
            --create-namespace --version v1.16.3 --set prometheus.enabled=true   --set crds.enabled=true
          echo "::endgroup::"
          echo "::group::Create cert-manager entities"
          kubectl apply -f qubership-test-pipelines/resources/test-issuer.yaml
          sleep 10s
          kubectl apply -f qubership-test-pipelines/resources/test-certificate.yaml
          sleep 10s
          kubectl apply -f qubership-test-pipelines/resources/test-clusterissuer.yaml
          echo "::endgroup::"
          echo "::group::Get cert-manager resources"
          kubectl get pods -n cert-manager
          kubectl get secrets -n cert-manager
          kubectl get certificates -A
          echo "::endgroup::"
          echo "::group::Get clusterissuer"
          kubectl get clusterissuer
          kubectl get clusterissuer test-clusterissuer -o yaml
          echo "::endgroup::"
      # == End ======= Specific steps for TLS =======

      # == Start ======= Specific steps for S3 =======
      - name: Create S3 bucket
        id: create_bucket
        if: matrix.test.s3 == true
        uses: ./qubership-test-pipelines/actions/shared/setup_s3_bucket
        with:
          aws_access_key_id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}
          region: us-east-1
          prefix: opensearch

      - name: Update YAML secrets
        if: matrix.test.s3 == true
        # zizmor: ignore[template-injection]
        run: |
          python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.template }}' \
            --path='opensearch/snapshots/s3/keyId' \
            --value='${{ secrets.AWS_S3_ACCESS_KEY_ID }}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.template }}' \
            --path='opensearch/snapshots/s3/keySecret' \
            --value='${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.template }}' \
            --path='opensearch/snapshots/s3/bucket' \
            --value="${{ steps.create_bucket.outputs.bucket_name }}"
      # == End ======= Specific steps for S3 =======

      # == Start Monitoring installation tests =======
      - name: Install Monitoring [${{ matrix.test.install_version }}]
        if: matrix.test.monitoring == true
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: monitoring_install
        with:
          path_to_template: templates/monitoring/vm_without_tests.yml
          service_branch: v0.88.0
          service_name: monitoring
          repository_name: Netcracker/qubership-monitoring-operator
          path_to_chart: charts/qubership-monitoring-operator
          namespace: monitoring
          restricted: false

      - name: Get Installed Monitoring CR name
        if: matrix.test.monitoring == true
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: install_monitoring_get_crds
        with:
          crd_location: Netcracker/qubership-monitoring-operator/charts/qubership-monitoring-operator/crds

      - name: Verify Monitoring installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        if: matrix.test.monitoring == true
        with:
          namespace: monitoring
          test_completion_max_retries: 40
          test_completion_retry_interval: 10s
          service_ready_max_retries: 500
          service_ready_retry_interval: 10s
          monitoring_pipeline: true
          repository_name: Netcracker/qubership-monitoring-operator
          crd_list: ${{ steps.install_monitoring_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Monitoring installation
        if: ${{ !cancelled() && steps.monitoring_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: monitoring
          artifact_name: Install_Monitoring_${{ matrix.test.artifact_name }}
          service_branch: main
      # == End Monitoring installation tests =======

      # == Start ======= Specific steps for Allure report =======
      - name: Add s3 backet for Allure report
        if: matrix.test.allure == true
        run: >-
          python qubership-test-pipelines/scripts/update_yaml.py
          --file='qubership-test-pipelines/${{ matrix.test.template }}'
          --path='integrationTests/atpReport/atpStorage/username'
          --value='${{secrets.AWS_S3_ACCESS_KEY_ID}}'
          && python qubership-test-pipelines/scripts/update_yaml.py
          --file='qubership-test-pipelines/${{ matrix.test.template }}'
          --path='integrationTests/atpReport/atpStorage/password'
          --value='${{secrets.AWS_S3_ACCESS_KEY_SECRET}}'
      # == End ======= Specific steps for Allure report =======

      - name: Print clean install deployment parameters
        run: cat qubership-test-pipelines/${{ matrix.test.template }}

      - name: Install Opensearch [${{ matrix.test.install_version }}]
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: opensearch_install
        with:
          path_to_template: ${{ matrix.test.template }}
          service_branch: ${{ matrix.test.install_version }}
          restricted: ${{ matrix.test.restricted }}
          service_name: opensearch
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.path_to_chart }}
          namespace: opensearch

      - name: Get Installed Opensearch CRD name
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: install_opensearch_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.path_to_chart }}/crds

      - name: Verify Opensearch installation [${{ matrix.test.install_version }}]
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          check_tests: true
          namespace: opensearch
          test_completion_max_retries: ${{ env.test_completion_max_retries }}
          test_completion_retry_interval: ${{ env.test_completion_retry_interval }}
          service_ready_max_retries: ${{ env.service_ready_max_retries }}
          service_ready_retry_interval: ${{ env.service_ready_retry_interval }}
          crd_list: ${{ steps.install_opensearch_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Opensearch installation [${{ matrix.test.install_version }}]
        if: ${{ !cancelled() && steps.opensearch_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: opensearch
          artifact_name: Installation_${{ matrix.test.artifact_name }}
          service_branch: ${{ matrix.test.install_version }}

      - name: Get Opensearch secrets
        if: ${{ matrix.test.tls == true }}
        run: |
          kubectl get secrets -n opensearch
      # == End ======= Installation steps =======

      # == Start ===== Upgrade steps ============
      - name: Print upgrade deployment parameters
        if: ${{ matrix.test.sequence == 'upgrade' }}
        run: cat qubership-test-pipelines/${{ matrix.test.upgrade_template }}

      - name: Sleep 1m before upgrade
        if: ${{ matrix.test.sequence == 'upgrade' }}
        run: sleep 1m

      - name: Upgrade Opensearch to [${{ matrix.test.upgrade_version }}]
        if: ${{ matrix.test.sequence == 'upgrade' }}
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: opensearch_upgrade
        with:
          path_to_template: ${{ matrix.test.upgrade_template }}
          service_branch: ${{ matrix.test.upgrade_version }}
          deploy_mode: upgrade
          restricted: ${{ matrix.test.restricted }}
          service_name: opensearch
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.path_to_chart }}
          namespace: opensearch

      - name: Get Upgraded Opensearch CRD name
        if: ${{ matrix.test.sequence == 'upgrade' }}
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: upgrade_opensearch_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.path_to_chart }}/crds

      - name: Sleep 1m after upgrade
        if: ${{ matrix.test.sequence == 'upgrade' }}
        run: sleep 1m

      - name: Hardening Check
        if: inputs.scope == 'hardening'
        uses: netcracker/qubership-workflow-hub/actions/k8s-hardening-scan@cabbb90e9471163cfac84bd50ff0296b2803b44c # v2.3.0
        with:
          namespaces: opensearch
          output-file: opensearch-hardening-scan.json
          install-kubescape: true
          execute-trivy-scan: true
          fail-on-mandatory-checks: true
          config-file: ${{ inputs.repository_name }}/.github/hardening-config.yaml

      - name: Verify Opensearch upgrade to [${{ matrix.test.upgrade_version }}]
        if: ${{ matrix.test.sequence == 'upgrade' }}
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          check_tests: true
          namespace: opensearch
          test_completion_max_retries: ${{ env.test_completion_max_retries }}
          test_completion_retry_interval: ${{ env.test_completion_retry_interval }}
          service_ready_max_retries: ${{ env.service_ready_max_retries }}
          service_ready_retry_interval: ${{ env.service_ready_retry_interval }}
          crd_list: ${{ steps.upgrade_opensearch_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Opensearch upgrade to [${{ matrix.test.upgrade_version }}]
        if: ${{ !cancelled() && steps.opensearch_upgrade.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: opensearch
          artifact_name: Upgrade_${{ matrix.test.artifact_name }}
          service_branch: ${{ matrix.test.upgrade_version }}
      # == End ===== Upgrade steps ============

      # == Start ======= Specific steps for S3 =======
      - name: Delete S3 bucket
        if: always() && matrix.test.s3 == true
        uses: ./qubership-test-pipelines/actions/shared/cleanup_s3_bucket
        with:
          aws_access_key_id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}
          bucket_name: ${{ steps.create_bucket.outputs.bucket_name }}
          region: us-east-1

      # == End ======= Specific steps for S3 =======

  final-status-check:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [Opensearch-Test-Cases]
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false
      - name: Check job status
        uses: ./qubership-test-pipelines/actions/shared/check_job_status
        with:
          job_result: ${{ needs.Opensearch-Test-Cases.result }}
