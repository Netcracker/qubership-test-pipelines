name: Reusable Kafka Tests

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      repository_name:
        description: Kafka repository name
        required: false
        type: string
        default: Netcracker/qubership-kafka
      service_branch:
        required: false
        type: string
        default: main
      pipeline_branch:
        description: Test pipeline branch name
        type: string
        required: true
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      service_versions_json:
        description: Kafka image versions as JSON
        type: string
        required: false
        default: |
          [
            "qubership-docker-kafka-3",
            "qubership-docker-kafka-4"
          ]
      scope:
        description: Kafka Test Scope (pr, nightly or hardening)
        type: string
        required: false
        default: pr
      skip_tests:
        description: Skip all tests (for doc-only changes)
        type: boolean
        required: false
        default: false

      verify_timeout_core_minutes:
        description: Maximum time (in minutes) to wait for core component verification
        type: number
        required: false
        default: 10
      verify_timeout_serv_minutes:
        description: Maximum time (in minutes) to wait for service component verification
        type: number
        required: false
        default: 10
  workflow_call:
    inputs:
      repository_name:
        description: Kafka repository name
        required: false
        type: string
        default: Netcracker/qubership-kafka
      service_branch:
        required: false
        type: string
        default: main
      pipeline_branch:
        description: Test pipeline branch name
        type: string
        required: true
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      service_versions_json:
        description: Kafka image versions as JSON
        type: string
        required: false
        default: |
          [
            "qubership-docker-kafka-3",
            "qubership-docker-kafka-4"
          ]
      scope:
        description: Kafka Test Scope (pr, nightly or hardening)
        type: string
        required: false
        default: pr
      skip_tests:
        description: Skip all tests (for doc-only changes)
        type: boolean
        required: false
        default: false
      verify_timeout_core_minutes:
        description: Maximum time (in minutes) to wait for core component verification
        type: number
        required: false
        default: 10
      verify_timeout_serv_minutes:
        description: Maximum time (in minutes) to wait for service component verification
        type: number
        required: false
        default: 10
    secrets:
      AWS_S3_ACCESS_KEY_ID:
        required: true
      AWS_S3_ACCESS_KEY_SECRET:
        required: true

jobs:
  prepare:
    if: ${{ !inputs.skip_tests }}
    runs-on: ${{ inputs.runner_type }}
    outputs:
      versions: ${{ steps.process-versions.outputs.versions }}
      previous_version: ${{ steps.process-versions.outputs.previous_version }}
      matrix: ${{ steps.process-versions.outputs.matrix }}
      service_ready_max_retries: ${{ steps.calc-timeout.outputs.service_ready_max_retries }}
      service_ready_retry_interval: ${{ steps.calc-timeout.outputs.service_ready_retry_interval }}
      service_ready_srvc_max_retries: ${{ steps.calc-timeout.outputs.service_ready_srvc_max_retries }}
      service_images: ${{ steps.parse-matrix.outputs.service_images }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.service_branch }}
          repository: ${{ inputs.repository_name }}
          path: qubership-kafka
          persist-credentials: false

      - name: Checkout pipeline
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false


      - name: Calculate verify timeout parameters
        id: calc-timeout
        run: |
          RETRY_INTERVAL=10
          MAX_RETRIES=$(( ${{ inputs.verify_timeout_core_minutes }} * 60 / RETRY_INTERVAL ))
          SRVC_MAX_RETRIES=$(( ${{ inputs.verify_timeout_serv_minutes }} * 60 / RETRY_INTERVAL ))
          {
            echo "service_ready_max_retries=$MAX_RETRIES"
            echo "service_ready_retry_interval=${RETRY_INTERVAL}s"
            echo "service_ready_srvc_max_retries=$SRVC_MAX_RETRIES"
          } >> $GITHUB_OUTPUT
      - name: Get latest tag
        id: get-latest-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ inputs.repository_name }}
        run: |
          LATEST_TAG=$(gh api repos/${REPO_NAME}/releases/latest --jq '.tag_name')
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Process latest tag and matrix generation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOPE: ${{ inputs.scope }}
          LATEST_TAG: ${{ steps.get-latest-tag.outputs.latest_tag }}
          SERVICE_BRANCH: ${{ inputs.service_branch }}
        id: process-versions
        working-directory: ${{ github.workspace }}/qubership-test-pipelines
        run: |
          chmod +x ./scripts/matrix.sh
          if [[ "$SCOPE" == "nightly" ]]; then
            CONFIG_FILE="./workflow-config/kafka_nightly.yaml"
          elif [[ "$SCOPE" == "pr" ]]; then
            CONFIG_FILE="./workflow-config/kafka.yaml"
          elif [[ "$SCOPE" == "hardening" ]]; then
            CONFIG_FILE="./workflow-config/kafka_hardening.yaml"
          else
            echo "::error::Invalid scope parameter '$SCOPE'. Must be 'pr', 'nightly' or 'hardening'."
            exit 1
          fi
          ./scripts/matrix.sh "$LATEST_TAG" "$CONFIG_FILE" "$SERVICE_BRANCH"

      - name: Parse JSON into matrix
        id: parse-matrix
        env:
          VERSIONS_JSON: ${{ inputs.service_versions_json }}
        run: |
          IMAGES=$(echo "$VERSIONS_JSON" | jq -c '.')
          echo "Kafka Images: $IMAGES"
          echo "service_images=$IMAGES" >> $GITHUB_OUTPUT

  Kafka-Test-Cases:
    if: ${{ !inputs.skip_tests }}
    runs-on: ${{ inputs.runner_type }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.prepare.outputs.matrix) }}
        service_image: ${{ fromJson(needs.prepare.outputs.service_images) }}
    name: ${{ matrix.service_image }} | ${{ matrix.test.name }}
    env:
      kfk_namespace: kafka
      kfk_max_attempts: ${{ needs.prepare.outputs.service_ready_max_retries }}
      kfk_timeout: ${{ needs.prepare.outputs.service_ready_retry_interval }}
      kfk_path_to_chart: operator/charts/helm/kafka
      kfk_srvc_namespace: kafka
      kfk_srvc_max_attempts: ${{ needs.prepare.outputs.service_ready_srvc_max_retries }}
      kfk_srvc_timeout: ${{ needs.prepare.outputs.service_ready_retry_interval }}
      kfk_srvc_path_to_chart: operator/charts/helm/kafka-service
    steps:
      # == 01 Start ======= Common pre-steps for all tests =======
      - name: Print job parameters
        env:
          MATRIX_JSON: ${{ toJson(matrix.test) }}
        run: |
          echo "======== Job parameters ======="
          echo "$MATRIX_JSON"
      - name: Checkout pipeline
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false
      - name: Create cluster
        uses: ./qubership-test-pipelines/actions/shared/create_cluster
      # == 01 End ======= Common pre-steps for all tests =======

      # == Start TLS certs addition if needed =======
      - name: Setup TLS
        if: matrix.test.tls == true
        uses: ./qubership-test-pipelines/actions/shared/setup_tls
      # == End TLS certs addition if needed =======

      # == Start Monitoring installation tests =======
      - name: Install Monitoring
        if: matrix.test.monitoring == true
        uses: ./qubership-test-pipelines/actions/shared/install_monitoring
        with:
          artifact_name: Install_Monitoring_${{ matrix.service_image }}_${{ matrix.test.install.artifact_name }}
      # == End Monitoring installation tests =======

      # == Start Zookeeper installation tests =======
      - name: Print install deployment parameters
        if: matrix.test.install.zookeeper == true
        run: cat qubership-test-pipelines/${{ matrix.test.install.zookeeper_template }}

      - name: Clean Install Zookeeper [LATEST]
        if: matrix.test.install.zookeeper == true
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: zoo_install
        with:
          path_to_template: ${{ matrix.test.install.zookeeper_template }}
          service_branch: main
          service_name: zookeeper-service
          repository_name: Netcracker/qubership-zookeeper
          path_to_chart: operator/charts/helm/zookeeper-service
          namespace: zookeeper

      - name: Get Installed Zookeeper CRD name
        if: matrix.test.install.zookeeper == true
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: install_zoo_get_crds
        with:
          crd_location: Netcracker/qubership-zookeeper/operator/charts/helm/zookeeper-service/crds

      - name: Verify Zookeeper installation
        if: matrix.test.install.zookeeper == true
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: zookeeper
          service_ready_max_retries: 80
          service_ready_retry_interval: 10s
          repository_name: Netcracker/qubership-zookeeper
          crd_list: ${{ steps.install_zoo_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Zookeeper installation
        if: ${{ !cancelled() && steps.zoo_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: zookeeper
          artifact_name: Install_Zookeeper_${{ matrix.service_image }}_${{ matrix.test.install.artifact_name }}
          service_branch: main
      # == End Zookeeper installation tests =======

      # == Start ======= Specific steps for S3 =======
      - name: Determine S3 bucket prefix
        if: matrix.test.install.s3 == true
        id: prefix
        env:
          SERVICE_IMAGE: ${{ matrix.service_image }}
        run: |
          if [[ "$SERVICE_IMAGE" == *kafka-4* ]]; then
            echo "prefix=kafka-4" >> $GITHUB_OUTPUT
          elif [[ "$SERVICE_IMAGE" == *kafka-3* ]]; then
            echo "prefix=kafka-3" >> $GITHUB_OUTPUT
          else
            echo "incorrect kafka version"
            exit 1
          fi

      - name: Create S3 bucket
        id: create_bucket
        if: matrix.test.install.s3 == true
        uses: ./qubership-test-pipelines/actions/shared/setup_s3_bucket
        with:
          aws_access_key_id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}
          region: us-east-1
          prefix: ${{ steps.prefix.outputs.prefix }}

      - name: Add S3 secrets to Kafka template
        if: matrix.test.install.s3 == true
        # zizmor: ignore[template-injection]
        run: |
          python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.install.kafka_service_template }}' \
            --path='global/secrets/backupDaemon/s3/keyId' \
            --value='${{ secrets.AWS_S3_ACCESS_KEY_ID }}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.install.kafka_service_template }}' \
            --path='global/secrets/backupDaemon/s3/keySecret' \
            --value='${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}' \
          && python qubership-test-pipelines/scripts/update_yaml.py \
            --file='qubership-test-pipelines/${{ matrix.test.install.kafka_service_template }}' \
            --path='backupDaemon/s3/bucket' \
            --value="${{ steps.create_bucket.outputs.bucket_name }}"
      # == End update YAML secrets if needed =======

      # == Start ======= Specific steps for Allure report =======
      - name: Add s3 backet for Allure report
        if: matrix.test.install.allure == true
        run: >-
          python qubership-test-pipelines/scripts/update_yaml.py
          --file='qubership-test-pipelines/${{ matrix.test.install.kafka_service_template }}'
          --path='integrationTests/atpReport/atpStorage/username'
          --value='${{secrets.AWS_S3_ACCESS_KEY_ID}}'
          && python qubership-test-pipelines/scripts/update_yaml.py
          --file='qubership-test-pipelines/${{ matrix.test.install.kafka_service_template }}'
          --path='integrationTests/atpReport/atpStorage/password'
          --value='${{secrets.AWS_S3_ACCESS_KEY_SECRET}}'
      # == End ======= Specific steps for Allure report =======

      # == Start kafka installation tests =======
      - name: Print install deployment parameters
        run: cat qubership-test-pipelines/${{ matrix.test.install.kafka_template }}

      - name: Clean Install Kafka [${{ matrix.test.install.version }}]
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_core_install
        with:
          path_to_template: ${{ matrix.test.install.kafka_template }}
          service_branch: ${{ matrix.test.install.version }}
          service_name: kafka
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_path_to_chart}}
          namespace: ${{ env.kfk_namespace }}
          image_replacement: ${{ matrix.service_image }}


      - name: Get Installed Kafka CRD name
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: install_kafka_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.kfk_path_to_chart}}/crds

      - name: Verify Kafka installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_namespace }}
          service_ready_max_retries: ${{ env.kfk_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_timeout }}
          crd_list: ${{ steps.install_kafka_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka Core installation
        if: ${{ !cancelled() && steps.kafka_core_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_namespace }}
          artifact_name: Install_Kafka_${{ matrix.service_image }}_${{ matrix.test.install.artifact_name }}
          service_branch: ${{ matrix.test.install.version }}
      # == End kafka installation tests =======

      - name: Get Kafka secrets
        if: matrix.test.install.tls == true
        run: |
          kubectl get secrets -n kafka
          kubectl get secret kafka-tls-secret -n kafka -o yaml

      # == Start kafka service installation tests =======
      - name: Clean Install Kafka Service [${{ matrix.test.install.version }}]
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_service_install
        with:
          path_to_template: ${{ matrix.test.install.kafka_service_template }}
          service_branch: ${{ matrix.test.install.version }}
          service_name: kafka-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_srvc_path_to_chart }}
          namespace: ${{ env.kfk_srvc_namespace }}


      - name: Get Installed Kafka-Service CRD name
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: install_kafka_service_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.kfk_srvc_path_to_chart}}/crds

      - name: Verify Kafka Service installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          service_ready_max_retries: ${{ env.kfk_srvc_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_srvc_timeout }}
          crd_list: ${{ steps.install_kafka_service_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka Service installation
        if: ${{ !cancelled() && steps.kafka_service_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          artifact_name: Install_Kafka_Service_${{ matrix.service_image }}_${{ matrix.test.install.artifact_name }}
          service_branch: ${{ matrix.test.install.version }}
      # == End kafka service installation tests =======

      # == Start kafka upgrade tests =======
      - name: Print upgrade deployment parameters
        run: cat qubership-test-pipelines/${{ matrix.test.upgrade.kafka_template }}
        if: matrix.test.sequence == 'upgrade'

      - name: Upgrade Kafka to [${{ matrix.test.upgrade.version }}]
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_core_upgrade
        with:
          path_to_template: ${{ matrix.test.upgrade.kafka_template }}
          service_branch: ${{ matrix.test.upgrade.version }}
          service_name: kafka
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_path_to_chart}}
          namespace: ${{ env.kfk_namespace }}
          deploy_mode: upgrade
          image_replacement: ${{ matrix.service_image }}


      - name: Get Upgraded Kafka CRD name
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: upgrade_kafka_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.kfk_path_to_chart}}/crds

      - name: Sleep 1m after upgrade
        if: matrix.test.sequence == 'upgrade'
        run: sleep 1m

      - name: Verify Kafka upgrade
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_namespace }}
          service_ready_max_retries: ${{ env.kfk_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_timeout }}
          crd_list: ${{ steps.upgrade_kafka_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka Core upgrade
        if: ${{ !cancelled() && steps.kafka_core_upgrade.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_namespace }}
          artifact_name: Upgrade_Kafka_${{ matrix.service_image }}_${{ matrix.test.upgrade.artifact_name }}
          service_branch: ${{ matrix.test.upgrade.version }}

      - name: Upgrade Kafka Service to [${{ matrix.test.upgrade.version }}]
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_service_upgrade
        with:
          path_to_template: ${{ matrix.test.upgrade.kafka_service_template }}
          service_branch: ${{ inputs.service_branch }}
          service_name: kafka-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_srvc_path_to_chart }}
          namespace: ${{ env.kfk_srvc_namespace }}
          deploy_mode: upgrade


      - name: Get Upgraded Kafka CRD name
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: upgrade_kafka_service_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.kfk_srvc_path_to_chart}}/crds

      - name: Sleep 1m after upgrade
        if: matrix.test.sequence == 'upgrade'
        run: sleep 1m

      - name: Hardening Check
        if: inputs.scope == 'hardening'
        uses: netcracker/qubership-workflow-hub/actions/k8s-hardening-scan@cabbb90e9471163cfac84bd50ff0296b2803b44c # v2.3.0
        with:
          namespaces: ${{ env.kfk_srvc_namespace }}
          output-file: kafka-service-hardening-scan.json
          install-kubescape: true
          execute-trivy-scan: false
          fail-on-mandatory-checks: true

      - name: Verify Kafka Service upgrade
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          service_ready_max_retries: ${{ env.kfk_srvc_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_srvc_timeout }}
          crd_list: ${{ steps.upgrade_kafka_service_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka Service upgrade
        if: ${{ !cancelled() && steps.kafka_service_upgrade.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          artifact_name: Upgrade_Kafka_Service_${{ matrix.service_image }}_${{ matrix.test.upgrade.artifact_name }}
          service_branch: ${{ matrix.test.upgrade.version }}
      # == End kafka upgrade tests =======

      # == Start kafka migrate tests =======
      - name: Print migrate deployment parameters
        if: matrix.test.sequence == 'migrate'
        run: cat qubership-test-pipelines/${{ matrix.test.migrate.kafka_template }}

      - name: Migrate Kafka to Kraft scheme
        if: matrix.test.sequence == 'migrate'
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_migrate
        with:
          path_to_template: ${{ matrix.test.migrate.kafka_template }}
          service_branch: ${{ matrix.test.migrate.version }}
          service_name: kafka
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_path_to_chart }}
          namespace: ${{ env.kfk_namespace }}
          deploy_mode: upgrade
          image_replacement: ${{ matrix.service_image }}


      - name: Sleep 1m after migration
        if: matrix.test.sequence == 'migrate'
        run: sleep 1m

      - name: Verify Kafka migration
        if: matrix.test.sequence == 'migrate'
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_namespace }}
          service_ready_max_retries: ${{ env.kfk_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_timeout }}
          crd_list: ${{ steps.install_kafka_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka Migration
        if: ${{ !cancelled() && steps.kafka_migrate.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_namespace }}
          artifact_name: Migrate_${{ matrix.service_image }}_${{ matrix.test.migrate.artifact_name }}
          service_branch: ${{ matrix.test.migrate.version }}

      # Upgrade after migration (Kafka 4)
      - name: Print upgrade deployment parameters (after migrate)
        if: matrix.test.sequence == 'migrate'
        run: cat qubership-test-pipelines/${{ matrix.test.upgrade.kafka_template }}

      - name: Upgrade Kafka to [${{ matrix.test.upgrade.version }}] (after migrate)
        if: matrix.test.sequence == 'migrate'
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_core_upgrade_migrate
        with:
          path_to_template: ${{ matrix.test.upgrade.kafka_template }}
          service_branch: ${{ matrix.test.upgrade.version }}
          service_name: kafka
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_path_to_chart }}
          namespace: ${{ env.kfk_namespace }}
          deploy_mode: upgrade
          image_replacement: ${{ matrix.service_image }}


      - name: Sleep 1m after upgrade (after migrate)
        if: matrix.test.sequence == 'migrate'
        run: sleep 1m

      - name: Verify Kafka upgrade (after migrate)
        if: matrix.test.sequence == 'migrate'
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_namespace }}
          service_ready_max_retries: ${{ env.kfk_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_timeout }}
          crd_list: ${{ steps.install_kafka_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka upgrade (after migrate)
        if: ${{ !cancelled() && steps.kafka_core_upgrade_migrate.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_namespace }}
          artifact_name: Upgrade_AfterMigrate_${{ matrix.service_image }}_${{ matrix.test.migrate.artifact_name }}
          service_branch: ${{ matrix.test.upgrade.version }}

      # Kafka Service after migration
      - name: Upgrade Kafka Service to [${{ matrix.test.upgrade.version }}] (after migrate)
        if: matrix.test.sequence == 'migrate'
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_service_upgrade_migrate
        with:
          path_to_template: ${{ matrix.test.upgrade.kafka_service_template }}
          service_branch: ${{ inputs.service_branch }}
          service_name: kafka-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_srvc_path_to_chart }}
          namespace: ${{ env.kfk_srvc_namespace }}
          deploy_mode: upgrade


      - name: Sleep 1m after service upgrade (after migrate)
        if: matrix.test.sequence == 'migrate'
        run: sleep 1m

      - name: Verify Kafka Service upgrade (after migrate)
        if: matrix.test.sequence == 'migrate'
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          service_ready_max_retries: ${{ env.kfk_srvc_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_srvc_timeout }}
          crd_list: ${{ steps.install_kafka_service_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka Service upgrade (after migrate)
        if: ${{ !cancelled() && steps.kafka_service_upgrade_migrate.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          artifact_name: ServiceUpgrade_AfterMigrate_${{ matrix.service_image }}_${{ matrix.test.migrate.artifact_name }}
          service_branch: ${{ matrix.test.install.version }}
      # == End kafka migrate tests =======

      # == Start ======= Specific steps for S3 =======
      - name: Delete S3 bucket
        if: always() && matrix.test.install.s3 == true
        uses: ./qubership-test-pipelines/actions/shared/cleanup_s3_bucket
        with:
          aws_access_key_id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_ACCESS_KEY_SECRET }}
          bucket_name: ${{ steps.create_bucket.outputs.bucket_name }}
          region: us-east-1

      # == End ======= Specific steps for S3 =======

  # ===== Kafka Migration (Kafka 3 → Kafka 3 KRaft → Kafka 4 KRaft) =====
  Kafka-Migration:
    needs: prepare
    if: inputs.scope == 'nightly' && !inputs.skip_tests
    runs-on: ${{ inputs.runner_type }}
    env:
      kfk_namespace: kafka
      kfk_max_attempts: ${{ needs.prepare.outputs.service_ready_max_retries }}
      kfk_timeout: ${{ needs.prepare.outputs.service_ready_retry_interval }}
      kfk_path_to_chart: operator/charts/helm/kafka
      kfk_srvc_namespace: kafka
      kfk_srvc_max_attempts: ${{ needs.prepare.outputs.service_ready_srvc_max_retries }}
      kfk_srvc_timeout: ${{ needs.prepare.outputs.service_ready_retry_interval }}
      kfk_srvc_path_to_chart: operator/charts/helm/kafka-service
      zk_template: templates/zookeeper-service/zookeeper_install_APP_k8s.yml
      kafka_install_template: templates/kafka-service/kafka_clean_migration.yml
      kafka_migrate_template: templates/kafka-service/kafka_clean_migration_kraft.yml
      kafka_upgrade_template: templates/kafka-service/kafka_clean_kraft.yml
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false

      - name: Create cluster
        uses: ./qubership-test-pipelines/actions/shared/create_cluster

      # ===== 1. ZooKeeper =====
      - name: Install ZooKeeper
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: zoo_install
        with:
          path_to_template: ${{ env.zk_template }}
          service_branch: main
          service_name: zookeeper-service
          repository_name: Netcracker/qubership-zookeeper
          path_to_chart: operator/charts/helm/zookeeper-service
          namespace: zookeeper

      - name: Get ZooKeeper CRDs
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: zoo_get_crds
        with:
          crd_location: Netcracker/qubership-zookeeper/operator/charts/helm/zookeeper-service/crds

      - name: Verify ZooKeeper
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: zookeeper
          service_ready_max_retries: 80
          service_ready_retry_interval: 10s
          repository_name: Netcracker/qubership-zookeeper
          crd_list: ${{ steps.zoo_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics ZooKeeper
        if: ${{ !cancelled() && steps.zoo_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: zookeeper
          artifact_name: Migration_ZooKeeper_Install
          service_branch: main

      # ===== 2. Kafka 3 Core with Zookeeper =====
      - name: Install [${{ inputs.service_branch }}] Kafka 3 Core
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_core_install
        with:
          path_to_template: ${{ env.kafka_install_template }}
          service_branch: ${{ inputs.service_branch }}
          service_name: kafka
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_path_to_chart }}
          namespace: ${{ env.kfk_namespace }}
          image_replacement: qubership-docker-kafka-3

      - name: Get Kafka Core CRDs
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: core_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.kfk_path_to_chart }}/crds

      - name: Verify Kafka 3 Core
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_namespace }}
          service_ready_max_retries: ${{ env.kfk_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_timeout }}
          crd_list: ${{ steps.core_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka 3 Core
        if: ${{ !cancelled() && steps.kafka_core_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_namespace }}
          artifact_name: Migration_Kafka3_Core
          service_branch: ${{ inputs.service_branch }}

      - name: Install [${{ inputs.service_branch }}] Kafka 3 Service
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_service_install
        with:
          path_to_template: ${{ env.kafka_install_template }}
          service_branch: ${{ inputs.service_branch }}
          service_name: kafka-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_srvc_path_to_chart }}
          namespace: ${{ env.kfk_srvc_namespace }}
          image_replacement: qubership-docker-kafka-3

      - name: Get Kafka Service CRDs
        uses: ./qubership-test-pipelines/actions/shared/get_crds
        id: service_get_crds
        with:
          crd_location: ${{ inputs.repository_name }}/${{ env.kfk_srvc_path_to_chart }}/crds

      # ===== 3. Kafka 3 Service with Zookeeper =====
      - name: Verify Kafka 3 Service
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          service_ready_max_retries: ${{ env.kfk_srvc_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_srvc_timeout }}
          crd_list: ${{ steps.service_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka 3 Service
        if: ${{ !cancelled() && steps.kafka_service_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          artifact_name: Migration_Kafka3_Service
          service_branch: ${{ inputs.service_branch }}

      # ===== 4. Migration to Kafka 3 Core KRaft =====
      - name: Migrate [${{ inputs.service_branch }}] Kafka Core to KRaft
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_core_migrate
        with:
          path_to_template: ${{ env.kafka_migrate_template }}
          service_branch: ${{ inputs.service_branch }}
          service_name: kafka
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_path_to_chart }}
          namespace: ${{ env.kfk_namespace }}
          deploy_mode: upgrade
          image_replacement: qubership-docker-kafka-3

      - name: Sleep 1m after KRaft migration
        run: sleep 1m

      - name: Verify Kafka 3 Core KRaft
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_namespace }}
          service_ready_max_retries: ${{ env.kfk_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_timeout }}
          crd_list: ${{ steps.core_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka 3 Core KRaft
        if: ${{ !cancelled() && steps.kafka_core_migrate.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_namespace }}
          artifact_name: Migration_Kafka3_Core_KRaft
          service_branch: ${{ inputs.service_branch }}

      # ===== 5. Migration to Kafka 3 Service KRaft =====
      - name: Migrate [${{ inputs.service_branch }}] Kafka 3 Service to KRaft
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_service_migrate
        with:
          path_to_template: ${{ env.kafka_migrate_template }}
          service_branch: ${{ inputs.service_branch }}
          service_name: kafka-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_srvc_path_to_chart }}
          namespace: ${{ env.kfk_srvc_namespace }}
          deploy_mode: upgrade
          image_replacement: qubership-docker-kafka-3

      - name: Sleep 1m after KRaft migration
        run: sleep 1m

      - name: Verify Kafka 3 Service KRaft
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          service_ready_max_retries: ${{ env.kfk_srvc_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_srvc_timeout }}
          crd_list: ${{ steps.service_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka Service KRaft
        if: ${{ !cancelled() && steps.kafka_service_migrate.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          artifact_name: Migration_Kafka3_Service_KRaft
          service_branch: ${{ inputs.service_branch }}

      # ===== 6. Upgrade to Kafka 4 Core =====
      - name: Upgrade Kafka 3 Core to [${{ inputs.service_branch }}] Kafka 4 Core
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_core_upgrade
        with:
          path_to_template: ${{ env.kafka_upgrade_template }}
          service_branch: ${{ inputs.service_branch }}
          service_name: kafka
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_path_to_chart }}
          namespace: ${{ env.kfk_namespace }}
          deploy_mode: upgrade
          image_replacement: qubership-docker-kafka-4

      - name: Sleep 1m after Kafka 4 upgrade
        run: sleep 1m

      - name: Verify Kafka Core Kafka 4
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_namespace }}
          service_ready_max_retries: ${{ env.kfk_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_timeout }}
          crd_list: ${{ steps.core_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka Core Kafka 4
        if: ${{ !cancelled() && steps.kafka_core_upgrade.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_namespace }}
          artifact_name: Migration_Kafka4_Core
          service_branch: ${{ inputs.service_branch }}

      # ===== 7. Upgrade to Kafka 4 Service =====
      - name: Upgrade Kafka 3 Service to [${{ inputs.service_branch }}] Kafka 4 Service
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: kafka_service_upgrade
        with:
          path_to_template: ${{ env.kafka_upgrade_template }}
          service_branch: ${{ inputs.service_branch }}
          service_name: kafka-service
          repository_name: ${{ inputs.repository_name }}
          path_to_chart: ${{ env.kfk_srvc_path_to_chart }}
          namespace: ${{ env.kfk_srvc_namespace }}
          deploy_mode: upgrade

      - name: Sleep 1m after Kafka 4 upgrade
        run: sleep 1m

      - name: Verify Kafka Service Kafka 4
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          service_ready_max_retries: ${{ env.kfk_srvc_max_attempts }}
          service_ready_retry_interval: ${{ env.kfk_srvc_timeout }}
          crd_list: ${{ steps.service_get_crds.outputs.crd_names }}

      - name: Collect Diagnostics Kafka Service Kafka 4
        if: ${{ !cancelled() && steps.kafka_service_upgrade.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: ${{ env.kfk_srvc_namespace }}
          artifact_name: Migration_Kafka4_Service
          service_branch: ${{ inputs.service_branch }}

  final-status-check:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [Kafka-Test-Cases, Kafka-Migration]
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false
      - name: Check Kafka-Test-Cases job status
        uses: ./qubership-test-pipelines/actions/shared/check_job_status
        with:
          job_result: ${{ needs.Kafka-Test-Cases.result }}
      - name: Check Kafka-Migration job status
        uses: ./qubership-test-pipelines/actions/shared/check_job_status
        with:
          job_result: ${{ needs.Kafka-Migration.result }}
